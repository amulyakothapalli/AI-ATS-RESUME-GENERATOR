<!DOCTYPE html>
<html>
<head>
    <title>AI ATS Resume Generator</title>
</head>
<body>

    <h1>AI ATS Resume Generator</h1>

    <form action="/generate" method="POST">

        <input type="text" name="name" placeholder="Your Name"><br><br>

        <input type="text" name="job_role" placeholder="Job Role"><br><br>

        <textarea name="skills" placeholder="Skills"></textarea><br><br>

        <textarea name="education" placeholder="Education"></textarea><br><br>

        <textarea name="projects" placeholder="Projects"></textarea><br><br>

        <textarea name="experience" placeholder="Experience"></textarea><br><br>

        <button type="submit">Generate Resume</button>

    </form>

</body>
</html>
